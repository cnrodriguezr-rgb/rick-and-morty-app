<section class="container">
  <h1 class="title">Cristian Nolberto Rodriguez Rodriguez-UNINCCA</h1>
  <p class="subtitle">Base feature-first/domain-first con contratos claros entre pantalla, dominio y API.</p>

  <input
    type="text"
    placeholder="Rick, Morty, Summer..."
    class="search"
    [(ngModel)]="search"
  />

  <p class="count">{{ filteredCharacters.length }} personajes</p>

  <div class="cards">
    <div class="card" *ngFor="let character of filteredCharacters">
      <img [src]="character.image" [alt]="character.name" />
      <h3>{{ character.name }}</h3>
    </div>
  </div>
</section>
